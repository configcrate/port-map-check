name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.12"
          cache: true
      - run: go test -count=1 -cover ./...
      - run: go vet ./...
      - run: go build ./cmd/port-map-check

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.12"
          cache: true
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  docker:
    name: Docker action
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: docker build -t port-map-check .
      - run: docker run --rm port-map-check --version

  action-smoke:
    name: Action and HTML report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Scan healthy example
        uses: ./
        with:
          path: examples/healthy-stack
          format: html
          output: port-map-report.html
          fail-on: warning
      - uses: actions/upload-artifact@v6
        with:
          name: port-map-report
          path: port-map-report.html
