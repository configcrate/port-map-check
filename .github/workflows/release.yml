name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.12"
          cache: true
      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          mkdir -p dist
          platforms=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
          )
          for platform in "${platforms[@]}"; do
            read -r goos goarch <<< "$platform"
            ext=""
            if [[ "$goos" == "windows" ]]; then
              ext=".exe"
            fi
            name="port-map-check_${version}_${goos}_${goarch}${ext}"
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X main.version=${version}" -o "dist/${name}" ./cmd/port-map-check
          done
          (cd dist && sha256sum * > checksums.txt)
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes
